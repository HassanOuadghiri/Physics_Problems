<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Slit Interference Animation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        h2 {
            margin-bottom: 10px;
        }
        .canvas-container {
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            border: 2px solid #333;
            background: #000;
        }
        .controls {
            display: flex;
            gap: 30px;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        input[type="range"] {
            width: 150px;
            cursor: pointer;
        }
        .formula {
            margin-top: 20px;
            background: #1e1e1e;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.95em;
            color: #add8e6;
        }
    </style>
</head>
<body>

    <h2>Young's Two-Slit Interference</h2>
    
    <div class="canvas-container">
        <canvas id="waveCanvas" width="500" height="400"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label for="distance">Slit Distance ($d$): <span id="dist-val">80</span>px</label>
            <input type="range" id="distance" min="20" max="200" value="80">
        </div>
        <div class="control-group">
            <label for="wavelength">Wavelength ($\lambda$): <span id="wave-val">25</span>px</label>
            <input type="range" id="wavelength" min="10" max="80" value="25">
        </div>
        <div class="control-group">
            <label for="speed">Animation Speed: <span id="speed-val">1.0</span>x</label>
            <input type="range" id="speed" min="0" max="3" step="0.1" value="1.0">
        </div>
    </div>

    <div class="formula">
        u(r, t) = (A / |r - r₁|) * sin(k|r - r₁| - ωt) + (A / |r - r₂|) * sin(k|r - r₂| - ωt)
    </div>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;

        // UI Elements
        const distSlider = document.getElementById('distance');
        const waveSlider = document.getElementById('wavelength');
        const speedSlider = document.getElementById('speed');
        const distVal = document.getElementById('dist-val');
        const waveVal = document.getElementById('wave-val');
        const speedVal = document.getElementById('speed-val');

        // Physics parameters
        let d = parseFloat(distSlider.value);
        let lambda = parseFloat(waveSlider.value);
        let k = 2 * Math.PI / lambda;
        let speedMultiplier = parseFloat(speedSlider.value);
        
        let t = 0;
        const A = 400; // Amplitude scaling factor for visualization purposes

        // Update parameters on slider change
        distSlider.oninput = () => { d = parseFloat(distSlider.value); distVal.innerText = d; };
        waveSlider.oninput = () => { 
            lambda = parseFloat(waveSlider.value); 
            k = 2 * Math.PI / lambda; 
            waveVal.innerText = lambda; 
        };
        speedSlider.oninput = () => {
            speedMultiplier = parseFloat(speedSlider.value);
            speedVal.innerText = speedMultiplier.toFixed(1);
        };

        // Pre-allocate image data for performance
        const imageData = ctx.createImageData(width, height);
        const data = imageData.data;

        function renderFrame() {
            // Slit positions (placed vertically at the left side of the canvas)
            const x1 = width * 0.2;
            const y1 = height / 2 - d / 2;
            
            const x2 = width * 0.2;
            const y2 = height / 2 + d / 2;
            
            // Assume wave velocity v = 1 for visualization, so omega = k * v = k
            // Time step gets scaled by user speed setting
            const omega = k; 
            const dt = 0.5 * speedMultiplier;

            let idx = 0;
            
            // Evaluate wave equation for every pixel
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    // Distance from slit 1
                    const dx1 = x - x1;
                    const dy1 = y - y1;
                    const r1 = Math.sqrt(dx1*dx1 + dy1*dy1) || 0.1; // Avoid division by zero
                    
                    // Distance from slit 2
                    const dx2 = x - x2;
                    const dy2 = y - y2;
                    const r2 = Math.sqrt(dx2*dx2 + dy2*dy2) || 0.1; // Avoid division by zero

                    // Displacement from each source
                    const u1 = (A / r1) * Math.sin(k * r1 - omega * t);
                    const u2 = (A / r2) * Math.sin(k * r2 - omega * t);
                    
                    // Resultant displacement
                    const u = u1 + u2;

                    // Map displacement [-1, 1] to color brightness [0, 255]
                    // We apply a soft clamping / contrast scalar
                    let color = 128 + u * 60;
                    
                    // Constrain color ranges
                    if (color > 255) color = 255;
                    if (color < 0) color = 0;

                    // Write pixel colors (Grayscale)
                    data[idx++] = color;     // Red
                    data[idx++] = color;     // Green
                    data[idx++] = color;     // Blue
                    data[idx++] = 255;       // Alpha
                }
            }

            // Push pixel data to canvas
            ctx.putImageData(imageData, 0, 0);

            // Draw the point sources (slits) explicitly as red dots
            ctx.fillStyle = '#ff4444';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'red';
            
            ctx.beginPath();
            ctx.arc(x1, y1, 4, 0, 2 * Math.PI);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(x2, y2, 4, 0, 2 * Math.PI);
            ctx.fill();
            ctx.shadowBlur = 0; // reset

            // Advance time and loop
            t += dt;
            requestAnimationFrame(renderFrame);
        }

        // Start animation
        renderFrame();
    </script>
</body>
</html>
